services:
  postgres:
    image: 'postgres:16-alpine'
    container_name: postgres-kkizq7m30dww6cdrl8xxfajq-204751595415
    restart: unless-stopped
    environment:
      POSTGRES_DB: '${DATABASE_NAME:-siyap_db}'
      POSTGRES_USER: '${DATABASE_USER:-siyap_admin}'
      POSTGRES_PASSWORD: '${DATABASE_PASSWORD:-SiyapKimaya2026!}'
      PGDATA: /var/lib/postgresql/data/pgdata
      DATABASE_NAME: siyap_db
      DATABASE_USER: siyap_admin
      DATABASE_PASSWORD: SiyapKimaya2026!
      COOLIFY_BRANCH: '"main"'
      COOLIFY_RESOURCE_UUID: kkizq7m30dww6cdrl8xxfajq
      COOLIFY_CONTAINER_NAME: postgres-kkizq7m30dww6cdrl8xxfajq-204751595415
      SERVICE_NAME_POSTGRES: postgres
      SERVICE_NAME_REDIS: redis
      SERVICE_NAME_WAHA: waha
      SERVICE_NAME_SIYAP_APP: siyap-app
    volumes:
      - 'kkizq7m30dww6cdrl8xxfajq_postgres-data:/var/lib/postgresql/data'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U ${DATABASE_USER:-siyap_admin} -d ${DATABASE_NAME:-siyap_db}'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      siyap-network: null
      kkizq7m30dww6cdrl8xxfajq: null
    labels:
      - coolify.managed=true
      - coolify.version=4.0.0
      - coolify.applicationId=1
      - coolify.type=application
      - coolify.name=postgres-kkizq7m30dww6cdrl8xxfajq-204751595415
      - coolify.resourceName=kimaya-applicationmain-ka4a0uma4xn32n9sc2j7qh14
      - coolify.projectName=kimaya
      - coolify.serviceName=kimaya-applicationmain-ka4a0uma4xn32n9sc2j7qh14
      - coolify.environmentName=production
      - coolify.pullRequestId=0
    env_file:
      - .env
  redis:
    image: 'redis:7-alpine'
    container_name: redis-kkizq7m30dww6cdrl8xxfajq-204751616619
    restart: unless-stopped
    command: 'redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru'
    volumes:
      - 'kkizq7m30dww6cdrl8xxfajq_redis-data:/data'
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      siyap-network: null
      kkizq7m30dww6cdrl8xxfajq: null
    labels:
      - coolify.managed=true
      - coolify.version=4.0.0
      - coolify.applicationId=1
      - coolify.type=application
      - coolify.name=redis-kkizq7m30dww6cdrl8xxfajq-204751616619
      - coolify.resourceName=kimaya-applicationmain-ka4a0uma4xn32n9sc2j7qh14
      - coolify.projectName=kimaya
      - coolify.serviceName=kimaya-applicationmain-ka4a0uma4xn32n9sc2j7qh14
      - coolify.environmentName=production
      - coolify.pullRequestId=0
    environment:
      COOLIFY_BRANCH: '"main"'
      COOLIFY_RESOURCE_UUID: kkizq7m30dww6cdrl8xxfajq
      COOLIFY_CONTAINER_NAME: redis-kkizq7m30dww6cdrl8xxfajq-204751616619
      SERVICE_NAME_POSTGRES: postgres
      SERVICE_NAME_REDIS: redis
      SERVICE_NAME_WAHA: waha
      SERVICE_NAME_SIYAP_APP: siyap-app
    env_file:
      - .env
  waha:
    image: devlikeapro/waha
    container_name: waha-kkizq7m30dww6cdrl8xxfajq-204751621378
    restart: unless-stopped
    environment:
      WHATSAPP_DEFAULT_ENGINE: NOWEB
      WAHA_DASHBOARD_USERNAME: admin
      WAHA_DASHBOARD_PASSWORD: KimayaWaha2026!
      WAHA_API_KEY: kimaya-siyap-api-key-2026
      WHATSAPP_HOOK_URL: 'http://siyap-app:3000/api/webhooks/whatsapp'
      WHATSAPP_HOOK_EVENTS: 'message,message.ack,session.status'
      WHATSAPP_START_SESSION: default
      WAHA_LOG_LEVEL: info
      COOLIFY_BRANCH: '"main"'
      COOLIFY_RESOURCE_UUID: kkizq7m30dww6cdrl8xxfajq
      COOLIFY_CONTAINER_NAME: waha-kkizq7m30dww6cdrl8xxfajq-204751621378
      SERVICE_NAME_POSTGRES: postgres
      SERVICE_NAME_REDIS: redis
      SERVICE_NAME_WAHA: waha
      SERVICE_NAME_SIYAP_APP: siyap-app
    volumes:
      - 'kkizq7m30dww6cdrl8xxfajq_waha-sessions:/app/.sessions'
    depends_on:
      - redis
    networks:
      siyap-network: null
      kkizq7m30dww6cdrl8xxfajq: null
    labels:
      - coolify.managed=true
      - coolify.version=4.0.0
      - coolify.applicationId=1
      - coolify.type=application
      - coolify.name=waha-kkizq7m30dww6cdrl8xxfajq-204751621378
      - coolify.resourceName=kimaya-applicationmain-ka4a0uma4xn32n9sc2j7qh14
      - coolify.projectName=kimaya
      - coolify.serviceName=kimaya-applicationmain-ka4a0uma4xn32n9sc2j7qh14
      - coolify.environmentName=production
      - coolify.pullRequestId=0
    env_file:
      - .env
  siyap-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: '${NEXT_PUBLIC_VAPID_PUBLIC_KEY}'
    container_name: siyap-app-kkizq7m30dww6cdrl8xxfajq-204751630479
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: 'postgresql://${DATABASE_USER:-siyap_admin}:${DATABASE_PASSWORD:-SiyapKimaya2026!}@postgres:5432/${DATABASE_NAME:-siyap_db}?schema=public'
      REDIS_URL: 'redis://redis:6379'
      WAHA_API_URL: 'http://waha:3000'
      WAHA_API_KEY: kimaya-siyap-api-key-2026
      JWT_SECRET: kimaya-siyap-jwt-secret-change-in-production-2026
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 30d
      COOKIE_SECURE: ''
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: '${NEXT_PUBLIC_VAPID_PUBLIC_KEY}'
      VAPID_PRIVATE_KEY: '${VAPID_PRIVATE_KEY}'
      COOLIFY_BRANCH: '"main"'
      COOLIFY_RESOURCE_UUID: kkizq7m30dww6cdrl8xxfajq
      COOLIFY_CONTAINER_NAME: siyap-app-kkizq7m30dww6cdrl8xxfajq-204751630479
      SERVICE_NAME_POSTGRES: postgres
      SERVICE_NAME_REDIS: redis
      SERVICE_NAME_WAHA: waha
      SERVICE_NAME_SIYAP_APP: siyap-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      waha:
        condition: service_started
    networks:
      siyap-network: null
      kkizq7m30dww6cdrl8xxfajq: null
    labels:
      - coolify.managed=true
      - coolify.version=4.0.0
      - coolify.applicationId=1
      - coolify.type=application
      - coolify.name=siyap-app-kkizq7m30dww6cdrl8xxfajq-204751630479
      - coolify.resourceName=kimaya-applicationmain-ka4a0uma4xn32n9sc2j7qh14
      - coolify.projectName=kimaya
      - coolify.serviceName=kimaya-applicationmain-ka4a0uma4xn32n9sc2j7qh14
      - coolify.environmentName=production
      - coolify.pullRequestId=0
    env_file:
      - .env
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  waha_sessions:
    driver: local
  kkizq7m30dww6cdrl8xxfajq_postgres-data:
    name: kkizq7m30dww6cdrl8xxfajq_postgres-data
  kkizq7m30dww6cdrl8xxfajq_redis-data:
    name: kkizq7m30dww6cdrl8xxfajq_redis-data
  kkizq7m30dww6cdrl8xxfajq_waha-sessions:
    name: kkizq7m30dww6cdrl8xxfajq_waha-sessions
networks:
  siyap-network:
    driver: bridge
  kkizq7m30dww6cdrl8xxfajq:
    name: kkizq7m30dww6cdrl8xxfajq
    external: false