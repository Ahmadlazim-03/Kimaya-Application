<style>
    /* ============================================= */
    /* SF HOMEPAGE MERCHANT PREVIEW — Clean Design   */

    .sfp-section {

    }

    /* --- Header --- */
    .sfp-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-bottom: 28px;
        gap: 16px;
        flex-wrap: wrap;
    }

    .sfp-header-left {}

    .sfp-header-title {
        font-size: 26px;
        font-weight: 700;
        color: #111827;
        margin: 0 0 6px;
        letter-spacing: -0.3px;
        line-height: 1.2;
    }

    .sfp-header-sub {
        font-size: 14px;
        color: #6B7280;
        margin: 0;
        font-weight: 400;
    }

    .sfp-header-sub strong {
        color: #111827;
        font-weight: 600;
    }

    .sfp-see-all {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        font-weight: 600;
        color: #2563EB;

        white-space: nowrap;
        transition: color 0.2s;
    }

    .sfp-see-all:hover {
        color: #1D4ED8;
    }

    .sfp-see-all svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
    }

    /* --- Card Grid --- */
    .sfp-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
    }

    /* --- Card --- */
    .sfp-card {
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #E5E7EB;
        transition: box-shadow 0.25s ease, border-color 0.25s ease;
        display: flex;
        flex-direction: column;
    }

    .sfp-card:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        border-color: #D1D5DB;
    }

    /* Card Image */
    .sfp-card-img {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 10;
        background: #F3F4F6;
        overflow: hidden;
    }

    .sfp-card-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    /* System Badge on image */
    .sfp-badge-wrap {
        position: absolute;
        top: 8px;
        left: 8px;
    }

    .sfp-badge {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.2px;
        text-transform: uppercase;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
    }

    .sfp-badge--autopilot {
        background: rgba(0, 212, 170, 0.9);
        color: #fff;
    }

    .sfp-badge--self {
        background: rgba(0, 153, 255, 0.9);
        color: #fff;
    }

    .sfp-badge--mandiri {
        background: rgba(237, 137, 54, 0.9);
        color: #fff;
    }

    /* Card Body */
    .sfp-card-body {
        padding: 12px 14px 14px;
        display: flex;
        flex-direction: column;
        flex: 1;
    }

    .sfp-card-name {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 600;
        color: #111827;
        line-height: 1.35;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    /* Stats row */
    .sfp-card-stats {
        display: flex;
        gap: 12px;
        margin-top: auto;
    }

    .sfp-stat {
        display: flex;
        flex-direction: column;
        min-width: 0;
    }

    .sfp-stat-label {
        font-size: 10px;
        color: #9CA3AF;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        margin-bottom: 1px;
    }

    .sfp-stat-value {
        font-size: 13px;
        font-weight: 700;
        color: #111827;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .sfp-stat-value--price {
        color: #2563EB;
    }

    /* Bottom CTA (mobile) */
    .sfp-bottom-cta {
        text-align: center;
        margin-top: 28px;
    }

    .sfp-bottom-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 32px;
        background: #111827;
        color: #fff !important;
        font-size: 14px;
        font-weight: 600;
        border-radius: 8px;
        text-decoration: none !important;
        transition: background 0.2s;
    }

    .sfp-bottom-btn:hover {
        background: #1F2937;
    }

    .sfp-bottom-btn svg {
        width: 16px;
        height: 16px;
    }

    /* Skeleton */
    .sfp-skeleton {
        border-radius: 12px;
        background: linear-gradient(110deg, #F3F4F6 8%, #E5E7EB 18%, #F3F4F6 33%);
        background-size: 200% 100%;
        animation: sfpShimmer 1.5s ease-in-out infinite;
    }

    .sfp-skeleton--card {
        height: 260px;
    }

    @keyframes sfpShimmer {
        0% {
            background-position: 200% 0;
        }

        100% {
            background-position: -200% 0;
        }
    }

    /* Error / Empty */
    .sfp-empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 48px 24px;
        color: #9CA3AF;
        font-size: 14px;
    }

    /* --- Responsive --- */
    @media (max-width: 1024px) {
        .sfp-grid {
            grid-template-columns: repeat(3, 1fr);
        }
    }

    @media (max-width: 768px) {
        .sfp-section {
            padding: 32px 16px 40px;
        }

        .sfp-grid {
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .sfp-header-title {
            font-size: 22px;
        }

        .sfp-header {
            margin-bottom: 20px;
        }
    }

    @media (max-width: 480px) {
        .sfp-grid {
            grid-template-columns: 1fr;
        }

        .sfp-header-title {
            font-size: 20px;
        }
    }
</style>

        </div>
        <a href="/merchant-franchise" class="sfp-see-all">
            Lihat Semua
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />

</div>

<script>
    (function () {
        /* ── Config ── */
        const SHEET_ID = '1UzMRkabs9vU69ftxrO9NJTDxAAdGzPv_Q6w8qK2z3BQ';
        const SHEET_NAME = 'Merchant';
        const SHEETS_API_URL = 'https://open-ai-key.startfranchise-id.workers.dev/api/sheets?spreadsheetId=' + SHEET_ID + '&range=' + encodeURIComponent(SHEET_NAME);
        const CARD_COUNT = 8;

        const grid = document.getElementById('sfp-grid');
        const subtitle = document.getElementById('sfp-subtitle');

        /* ── Parse API response ── */
        function parseAPIResponse(json) {
            if (!json.values || json.values.length < 2) return [];
            const rows = json.values.slice(1); // skip header
            const data = [];
            for (let i = 0; i < rows.length; i++) {
                const r = rows[i];
                if (!r[1]) continue;
                const sistem = normSys((r[4] || '').replace(/&amp;/g, '&'));
                data.push({
                    nama: r[1],
                    harga: r[2] || '',
                    bep: r[3] || '',
                    sistem: sistem,
                    imageUrl: r[5] || '',
                    priceNum: priceNum(r[2])
                });
            }
            return data;
        }

        /* ── Helpers ── */
        function normSys(s) {
            s = s.trim();
            if (/self\s*manage[d]?\s*[&]\s*autopilot/i.test(s)) return 'Self Managed & Autopilot';
            if (/autopilot/i.test(s)) return 'Autopilot';
            if (/self\s*manage/i.test(s)) return 'Self Managed';
            if (/mandiri/i.test(s)) return 'Mandiri';
            return s || 'N/A';
        }

        function priceNum(str) {
            if (!str) return 0;
            return parseInt(str.replace(/[^\d]/g, '')) || 0;
        }

        function fmtPrice(num) {
            if (num >= 1e9) {
                const b = num / 1e9;
                return 'Rp ' + (b % 1 === 0 ? b.toFixed(0) : b.toFixed(1)) + ' Milyar';
            }
            if (num >= 1e6) {
                const m = num / 1e6;
                return 'Rp ' + (m % 1 === 0 ? m.toFixed(0) : m.toFixed(1)) + ' Juta';
            }
            return 'Rp ' + num.toLocaleString('id-ID');
        }

        function resolveImg(url) {
            if (!url) return '';
            url = url.trim();
            if (url.includes('lh3.googleusercontent.com')) return url;
            var m = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (m) return 'https://lh3.googleusercontent.com/d/' + m[1] + '=s600';
            m = url.match(/drive\.google\.com\/.*[?&]id=([a-zA-Z0-9_-]+)/);
            if (m) return 'https://lh3.googleusercontent.com/d/' + m[1] + '=s600';
            m = url.match(/drive\.google\.com\/thumbnail\?id=([a-zA-Z0-9_-]+)/);
            if (m) return 'https://lh3.googleusercontent.com/d/' + m[1] + '=s600';
            return url;
        }

        function badgeInfo(sistem) {
            var s = sistem.toLowerCase();
            if (s.includes('self') && s.includes('autopilot')) return { cls: 'sfp-badge--self', label: 'Self Managed & Autopilot' };
            if (s.includes('autopilot')) return { cls: 'sfp-badge--autopilot', label: 'Autopilot' };
            if (s.includes('self')) return { cls: 'sfp-badge--self', label: 'Self Managed' };
            if (s.includes('mandiri')) return { cls: 'sfp-badge--mandiri', label: 'Mandiri' };
            return { cls: 'sfp-badge--self', label: sistem };
        }

        /* ── Render ── */
        function renderCards(merchants) {
            // Update subtitle with count
            subtitle.innerHTML = '<strong>' + merchants.length + '+</strong> merchant franchise &amp; kemitraan tersedia';

            // Random pick
            var picked = merchants.slice().sort(function () { return Math.random() - 0.5; }).slice(0, CARD_COUNT);
            var html = '';

            picked.forEach(function (m) {
                var img = resolveImg(m.imageUrl);
                var price = m.priceNum > 0 ? fmtPrice(m.priceNum) : m.harga || '-';
                var bep = m.bep || '-';
                var bi = badgeInfo(m.sistem);
                var bc = bi.cls;
                var bl = bi.label;

                html += '<div class="sfp-card">'
                    + '<div class="sfp-card-img">'
                    + (img ? '<img src="' + img + '" alt="' + m.nama + '" loading="lazy" onerror="this.style.display=\'none\'">' : '')
                    + '<div class="sfp-badge-wrap"><span class="sfp-badge ' + bc + '">' + bl + '</span></div>'
                    + '</div>'
                    + '<div class="sfp-card-body">'
                    + '<h3 class="sfp-card-name">' + m.nama + '</h3>'
                    + '<div class="sfp-card-stats">'
                    + '<div class="sfp-stat"><span class="sfp-stat-label">Mulai dari</span><span class="sfp-stat-value sfp-stat-value--price">' + price + '</span></div>'
                    + '<div class="sfp-stat"><span class="sfp-stat-label">BEP</span><span class="sfp-stat-value">' + bep + '</span></div>'
                    + '</div>'
                    + '</div>'
                    + '</div>';
            });

            grid.innerHTML = html;
        }

        function showError(msg) {
            grid.innerHTML = '<div class="sfp-empty">' + msg + '</div>';
        }

        function fetchSheetsViaProxy() {
            return fetch(SHEETS_API_URL).then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            });
        }

        /* ── Init ── */
        function init() {
            fetchSheetsViaProxy()
                .then(function (json) {
                    var merchants = parseAPIResponse(json);
                    if (merchants.length === 0) {
                        showError('Belum ada data merchant.');
                        return;
                    }
                    renderCards(merchants);
                })
                .catch(function (err) {
                    console.error('[SFP] Fetch failed:', err);
                    showError('Gagal memuat data merchant dari proxy.');
                });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>
